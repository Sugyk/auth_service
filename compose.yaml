services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-service-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:4
    container_name: auth-service-migrate
    volumes:
      - ./internal/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    # Выполнит все .up.sql файлы и остановится
    command: [
      "-path", "/migrations",
      "-database", "postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable",
      "up"
    ]
    restart: "no"  # Важно: контейнер не будет перезапускаться после завершения

  service:
    build:
      dockerfile: docker/Dockerfile
    container_name: auth_service
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/config.yaml:/app/config.yaml
      - ./internal/migrations:/app/migrations