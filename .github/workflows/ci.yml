name: CI

on: [push, pull_request]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run unit tests
        run: go test ./internal/... -coverprofile=coverage_unit.out -coverpkg=github.com/Sugyk/auth_service/...
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage_unit.out
          flag-name: unit

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run integration tests
        run: docker compose -f tests/docker/compose.yaml up --abort-on-container-exit
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage_integration.out
          flag-name: integration
